<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Renk Seçici - gestureOS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1em;
        }

        .instructions {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 30px;
            font-size: 0.95em;
            color: #0c5aa0;
            line-height: 1.6;
        }

        .instructions strong {
            color: #0c5aa0;
        }

        .palette-section {
            margin-bottom: 30px;
        }

        .palette-section h3 {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .color-box {
            aspect-ratio: 1;
            border-radius: 10px;
            border: 3px solid #ddd;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .color-box:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            border-color: #333;
        }

        .color-box.selected {
            border-color: #000;
            border-width: 4px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .color-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .color-info h3 {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .color-values {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .color-value {
            background: white;
            border-radius: 8px;
            padding: 12px;
            border-left: 4px solid #667eea;
        }

        .color-value-label {
            font-size: 0.85em;
            color: #999;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .color-value-content {
            font-size: 0.95em;
            color: #333;
            font-family: 'Monaco', 'Courier New', monospace;
            word-break: break-all;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 0.95em;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .status.waiting {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .color-grid {
                gap: 8px;
            }

            .color-values {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Renk Seçici</h1>
            <p>gestureOS - Renk Seçim Modu</p>
        </div>

        <div class="instructions">
            <strong>📝 Nasıl Kullanılır:</strong><br>
            Renklerden birini seçin. Seçtiğiniz renk OpenCV uygulamasında otomatik olarak güncellenecek.
        </div>

        <div class="palette-section">
            <h3>🎨 Renk Paleti (4x4)</h3>
            <div class="color-grid" id="colorGrid"></div>
        </div>

        <div class="color-info">
            <h3>📊 Seçilen Renk</h3>
            <div class="color-values">
                <div class="color-value">
                    <div class="color-value-label">HEX</div>
                    <div class="color-value-content" id="hexValue">#00FF00</div>
                </div>
                <div class="color-value">
                    <div class="color-value-label">RGB</div>
                    <div class="color-value-content" id="rgbValue">rgb(0, 255, 0)</div>
                </div>
                <div class="color-value">
                    <div class="color-value-label">BGR (OpenCV)</div>
                    <div class="color-value-content" id="bgrValue">BGR(0, 255, 0)</div>
                </div>
                <div class="color-value">
                    <div class="color-value-label">Adı</div>
                    <div class="color-value-content" id="colorName">Yeşil</div>
                </div>
            </div>
        </div>

        <div class="status waiting" id="status">
            ⏳ Bağlanıyor...
        </div>
    </div>

    <script>
        // 4x4 Renk Paleti - Ana Renkler + Bilindik Renkler
        const colors = [
            { hex: "#FF0000", name: "Kırmızı", rgb: [255, 0, 0] },           // Red
            { hex: "#00FF00", name: "Yeşil", rgb: [0, 255, 0] },             // Green
            { hex: "#0000FF", name: "Mavi", rgb: [0, 0, 255] },              // Blue
            { hex: "#FFFF00", name: "Sarı", rgb: [255, 255, 0] },            // Yellow
            
            { hex: "#FF7F00", name: "Turuncu", rgb: [255, 127, 0] },         // Orange
            { hex: "#8B00FF", name: "Mor", rgb: [139, 0, 255] },             // Purple
            { hex: "#FF1493", name: "Pembe", rgb: [255, 20, 147] },          // Pink
            { hex: "#00FFFF", name: "Camgöbeği", rgb: [0, 255, 255] },       // Cyan
            
            { hex: "#FFFFFF", name: "Beyaz", rgb: [255, 255, 255] },         // White
            { hex: "#000000", name: "Siyah", rgb: [0, 0, 0] },               // Black
            { hex: "#808080", name: "Gri", rgb: [128, 128, 128] },           // Gray
            { hex: "#FFA500", name: "Açık Turuncu", rgb: [255, 165, 0] },    // Light Orange
            
            { hex: "#800080", name: "Koyu Mor", rgb: [128, 0, 128] },        // Dark Purple
            { hex: "#008080", name: "Teal", rgb: [0, 128, 128] },            // Teal
            { hex: "#FFC0CB", name: "Açık Pembe", rgb: [255, 192, 203] },    // Light Pink
            { hex: "#A52A2A", name: "Kahverengi", rgb: [165, 42, 42] }       // Brown
        ];

        let currentColor = colors[1]; // Yeşil başlangıç

        // Paleti oluştur
        function createPalette() {
            const grid = document.getElementById('colorGrid');
            grid.innerHTML = '';
            
            colors.forEach((color, idx) => {
                const box = document.createElement('div');
                box.className = 'color-box';
                box.style.backgroundColor = color.hex;
                
                if (color.hex === currentColor.hex) {
                    box.classList.add('selected');
                }
                
                box.addEventListener('click', () => selectColor(idx));
                grid.appendChild(box);
            });
        }

        // Renk seç
        function selectColor(idx) {
            currentColor = colors[idx];
            createPalette();
            updateDisplay();
            sendColorToServer(currentColor.hex);
        }

        // Ekranda göster
        function updateDisplay() {
            const r = currentColor.rgb[0];
            const g = currentColor.rgb[1];
            const b = currentColor.rgb[2];
            
            // BGR for OpenCV
            const bgr = [b, g, r];
            
            document.getElementById('hexValue').textContent = currentColor.hex;
            document.getElementById('rgbValue').textContent = `rgb(${r}, ${g}, ${b})`;
            document.getElementById('bgrValue').textContent = `BGR(${b}, ${g}, ${r})`;
            document.getElementById('colorName').textContent = currentColor.name;
        }

        // Flask sunucusuna gönder
        async function sendColorToServer(hexColor) {
            try {
                const response = await fetch('/api/color', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ hex: hexColor })
                });

                if (response.ok) {
                    const data = await response.json();
                    updateStatus('connected', '✅ Renk güncellendi: ' + hexColor);
                } else {
                    updateStatus('disconnected', '❌ Sunucu hatası');
                }
            } catch (error) {
                updateStatus('disconnected', '❌ Bağlantı hatası');
                console.error('Error:', error);
            }
        }

        // Durum güncelle
        function updateStatus(type, message) {
            const statusEl = document.getElementById('status');
            statusEl.className = 'status ' + type;
            statusEl.textContent = message;
        }

        // Başlangıçta paleti yükle
        createPalette();
        updateDisplay();

        // Bağlantı kontrolü
        window.addEventListener('load', () => {
            fetch('/api/color')
                .then(r => r.json())
                .then(data => {
                    updateStatus('connected', '✅ gestureOS bağlı');
                })
                .catch(e => {
                    updateStatus('waiting', '⏳ gestureOS için bekleniyor...');
                });
        });

        // Periyodik kontrol
        setInterval(() => {
            fetch('/api/color')
                .then(r => r.json())
                .catch(e => {
                    updateStatus('waiting', '⏳ gestureOS için bekleniyor...');
                });
        }, 5000);
    </script>
</body>
</html>
